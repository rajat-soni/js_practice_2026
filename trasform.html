<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trasform properties</title>
    <style>
        .screen {
            display:flex;
            height:100vh;
            justify-content: center;
            flex-direction: column;
            background-color: cornsilk;
        gap:20px;
        }
        
       .box {
        width:150px;
        height:110px;
        border:2px solid #000;
        text-align: center;
        font-size: 20px;
        background-color: aquamarine;
        transition: all 2s linear;

       }
       
       .box:hover {
        /* transform: translateX(200px) ; */
        transform:translate(200px,200px);
       }

       .box2 {
        width:150px;
        height:110px;
        border:2px solid #000;
        text-align: center;
        font-size: 20px;
        background-color: chartreuse;
       }

       .box3 {
        width:150px;
        height:110px;
        border:2px solid #000;
        text-align: center;
        font-size: 20px;
        background-color: thistle;
       }

       .box4 {
        width:150px;
        height:110px;
        border:2px solid #000;
        text-align: center;
        font-size: 20px;
        background-color: rgb(152, 163, 141);
       }

       }
    </style>
</head>
<body>
    <div class="screen">
        <div class="box">Traslate property</div>
        <div class="box2"> Rotate property</div>
        <div class="box3">Scale property</div>
        <div class="box4">Skew property</div>
    </div>
</body>
</html>
