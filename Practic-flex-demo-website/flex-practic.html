<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>flex demo webs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Navigation Bar</h2>

         <button>login</button>

     <div class="layout">

          content

    <div class="login-wraper">

        <input type="text" id="username" class="username">

        <button class="button" id="submit-button" value = "submit">Submit</button>
        </div>
    </div>
